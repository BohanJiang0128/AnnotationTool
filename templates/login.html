<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annotation Tool — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #060b14;
    overflow: hidden;
    position: relative;
  }

  .bg-gradient {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,180,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(120,60,255,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(0,255,180,0.05) 0%, transparent 50%);
  }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
  }

  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 48px 44px;
    width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #00b4ff, #6a3fff);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .logo-text { font-size: 20px; font-weight: 700; color: #f1f5f9; }
  .logo-sub  { font-size: 12px; color: #64748b; margin-top: 2px; }

  h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }

  label {
    display: block; font-size: 13px; font-weight: 500;
    color: #94a3b8; margin-bottom: 8px; letter-spacing: 0.02em;
  }

  input[type="text"], input[type="password"] {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #f1f5f9; font-size: 15px; font-family: inherit;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: rgba(0,180,255,0.5);
    box-shadow: 0 0 0 3px rgba(0,180,255,0.1);
  }

  .pwd-wrapper { position: relative; display: flex; align-items: center; }
  .pwd-wrapper input { padding-right: 44px; }
  .btn-pwd-toggle {
    position: absolute; right: 8px; background: none; border: none;
    color: #64748b; cursor: pointer; padding: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s; outline: none;
  }
  .btn-pwd-toggle:hover { color: #f1f5f9; }
  .btn-pwd-toggle svg { width: 18px; height: 18px; }
  .eye-off { display: none; }
  .btn-pwd-toggle.visible .eye-on { display: none; }
  .btn-pwd-toggle.visible .eye-off { display: block; }

  .error-msg {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fca5a5; font-size: 13px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #0090e0, #6a3fff);
    border: none; border-radius: 12px;
    color: #fff; font-size: 15px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,144,224,0.3);
    margin-top: 8px;
  }

  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(0,144,224,0.45); }
  .btn-login:active { transform: translateY(0); }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="grid-bg"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🫀</div>
    <div>
      <div class="logo-text">AnnotationTool</div>
      <div class="logo-sub">3D Body Surface Annotation</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to access the annotation workspace</p>

  {% if error %}
  <div class="error-msg">
    <span>⚠</span> {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="pwd-wrapper">
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" class="btn-pwd-toggle" id="pwd-toggle" title="View/hide password">
          <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
             <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
             <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
             <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
             <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login">Sign In →</button>
  </form>
</div>
  <script>
    const toggleBtn = document.getElementById('pwd-toggle');
    const pwdInput = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
      const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
      pwdInput.setAttribute('type', type);
      toggleBtn.classList.toggle('visible');
    });
  </script>
</body>
</html>
