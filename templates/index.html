<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Annotation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo-icon">🫀</div>
    <span class="logo-name">AnnotationTool</span>
    <span class="logo-badge">3D BSA</span>
  </div>
  <div class="header-right">
    <span class="user-pill">👤 {{ username }}</span>
    <a href="/logout" class="btn-logout">Sign Out</a>
  </div>
</header>

<!-- Main Layout: 4-column -->
<div class="workspace">

  <!-- ── Panel 1: Image List ── -->
  <aside class="panel panel-images" id="panel-images">
    <div class="panel-title">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Images
    </div>

    <div class="dir-section">
      <div class="dir-row">
        <select id="patient-select" class="dir-input">
          <option value="" disabled selected>Select a patient folder...</option>
        </select>
      </div>
    </div>

    <div id="image-list" class="image-list">
      <div class="list-placeholder">Browse a directory to load images</div>
    </div>
  </aside>
  <div class="splitter" data-left="panel-images" title="Drag to resize"></div>

  <!-- ── Panel 2: Image Preview ── -->
  <div class="panel panel-preview" id="panel-preview">
    <div class="panel-title">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Image Preview
    </div>
    <div id="image-preview-area" class="image-preview-area">
      <div class="preview-placeholder">
        <div class="placeholder-icon">🖼</div>
        <span>Select an image from the list</span>
      </div>
      <div id="zoom-badge" class="zoom-badge hidden">100%</div>
    </div>
    <div id="image-preview-name" class="image-preview-name"></div>
  </div>
  <div class="splitter" data-left="panel-preview" title="Drag to resize"></div>

  <!-- ── Panel 3: 3D Viewer ── -->
  <div class="panel panel-viewer" id="panel-viewer">
    <!-- Toolbar -->
    <div class="viewer-toolbar">
      <div class="tool-group">
        <button id="tool-cursor" class="tool-btn active" title="Cursor — orbit/zoom/pan">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 3l14 9-7 1-4 7z"/></svg>
          Cursor
        </button>
        <button id="tool-pen" class="tool-btn" title="Pen — left click paint, right click erase">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          Pen
        </button>
      </div>
      <div class="tool-divider"></div>
      <div class="brush-group" title="Brush size (active when Pen is selected)">
        <span class="brush-label">Brush</span>
        <button class="brush-btn active" id="brush-S" data-size="S" title="Small — single triangle">S</button>
        <button class="brush-btn" id="brush-M" data-size="M" title="Medium — nearby patch">M</button>
        <button class="brush-btn" id="brush-L" data-size="L" title="Large — wide area">L</button>
      </div>

      <button id="clear-btn" class="action-btn" title="Clear all annotations">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        Clear
      </button>
      <button id="bsa-btn" class="action-btn accent-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Calculate BSA
      </button>
      <div id="bsa-display" class="bsa-display hidden">
        <span id="bsa-pct" class="bsa-pct">0%</span>
        <span class="bsa-label">annotated BSA</span>
      </div>
      <div id="save-status" class="save-status hidden">
        <span id="save-status-text"></span>
      </div>
    </div>

    <!-- Canvas container -->
    <div id="viewer-container" class="viewer-container">
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <div class="loading-text">Loading model…</div>
        <div id="load-progress-bar" class="progress-bar"><div id="load-progress-fill" class="progress-fill"></div></div>
      </div>
      <div id="no-model-msg" class="no-model-msg">
        <div class="no-model-icon">🧍</div>
        <p>Select a model from the panel →</p>
      </div>
    </div>

    <!-- Pen mode hint -->
    <div id="pen-hint" class="pen-hint hidden">
      <span>✏️ <strong>Left click</strong> to paint &nbsp;|&nbsp; <strong>Right click</strong> to erase</span>
    </div>
  </div>
  <div class="splitter" data-right="panel-models" title="Drag to resize"></div>

  <!-- ── Panel 4: Model Selector ── -->
  <aside class="panel panel-models" id="panel-models">
    <div class="panel-title">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      3D Models
    </div>
    <div id="model-list" class="model-list">
      <div class="list-placeholder">Loading models…</div>
    </div>
    <div class="model-info-box" id="model-info-box" style="display:none;">
      <div class="model-info-name" id="model-info-name"></div>
      <div class="model-info-stats" id="model-info-stats"></div>
    </div>
  </aside>

</div>



<script type="module" src="/static/js/main.js"></script>
</body>
</html>
